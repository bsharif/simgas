# Netlify configuration for SimGas.
#
# The app is a pure static SPA — no functions, no server-side anything. Netlify
# just needs to know how to build it and what to publish.
#
# Drag-and-drop deploys of the `dist/` folder also work without this file;
# this config is for when the site is connected to the GitHub repo and Netlify
# rebuilds on push.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback. We don't have client-side routing yet, but the moment we add
# react-router or similar the deep-link refresh would 404 without this.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long cache for hashed asset bundles; the HTML stays uncached so deploys are
# picked up instantly.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
